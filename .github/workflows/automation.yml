name: Automated AI News Pulse

on:
  schedule:
    - cron: '0 */4 * * *' # Si avvia in automatico ogni 4 ore
  workflow_dispatch: # Ti permette di avviarlo manualmente con un tasto su GitHub

jobs:
  run-updater:
    runs-on: ubuntu-latest
    steps:
      # AGGIORNATO da v3 a v4 per il supporto nativo a Node.js più recenti
      - name: Checkout del codice
        uses: actions/checkout@v4

      # AGGIORNATO da v3 a v4
      - name: Configurazione di Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Usiamo una versione Long Term Support stabile e recente

      - name: Esecuzione dello script Gatekeeper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node cron-fetch.js

      - name: Salvataggio automatico delle notizie
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff-index --quiet HEAD || git commit -m "Auto-update verified news feed [skip ci]"
          git push origin main
